name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CAMBER_CI_FEATURES: profiling,ws,grpc,acme,dns01,nats,sqs,otel

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '.github/workflows/**'

  check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --check
      - run: cargo clippy --workspace --features "${CAMBER_CI_FEATURES}" -- -D warnings
      - run: cargo install pedant && find . -path '*/src/*.rs' | xargs pedant
      - run: cargo test --workspace --features "${CAMBER_CI_FEATURES}"
      - run: cargo install cargo-deny && cargo deny --workspace check

  supply-chain:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Diagnose cc vendor contents
        run: |
          cargo vendor /tmp/diag-vendor --quiet
          echo "=== cc version ==="
          sed -n 's/^version = "\(.*\)"/\1/p' /tmp/diag-vendor/cc/Cargo.toml | head -1
          echo "=== file list ==="
          (cd /tmp/diag-vendor/cc && find . -name '*.rs' -type f | sort)
          echo "=== per-file sha256 ==="
          (cd /tmp/diag-vendor/cc && find . -name '*.rs' -type f | sort | xargs sha256sum)
          echo "=== pedant attestation ==="
          (cd /tmp/diag-vendor/cc && pedant --attestation --crate-name cc --crate-version 1.2.60 $(find . -name '*.rs' -type f | sort)) 2>/dev/null || true
          echo "=== baseline ==="
          cat .pedant/baselines/cargo/cc/1.2.60.json | jq '{source_hash, crate_version}'
      - uses: jostled-org/pedant/.github/actions/supply-chain-check@47a9bb080199b4a13ee062b4581686373ef436f8
        if: always()
        with:
          baseline-path: .pedant/baselines
          fail-on: none
