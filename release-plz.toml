[workspace]
semver_check = true
changelog_update = true
git_release_enable = true

# Only conventional commit types that represent real work trigger a
# version bump. This prevents release-plz's own "chore: release"
# commits from being treated as unreleased work, which otherwise
# causes an infinite loop of release PRs.
release_commits = "^(feat|fix|perf|refactor|build|test)[(:]"
